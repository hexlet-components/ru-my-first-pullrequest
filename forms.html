<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы</title>
</head>
<body>
    <form>
        <fieldset>
            <legend><h1>Личные данные</h1></legend>
            <label>
                <h3>Фамилия</h3>
                <input type="text" name="surneim" placeholder="Введите фамилию">
            </label>
            <label>
                <h3>Имя</h3>
                <input type="text" name="neme" placeholder="Введите имя">
            </label>
            <label>
                <h3>Отчество</h3>
                <input type="text" name="" placeholder="Введите отчество">
            </label>
            <label>
                <h3>Дата рождения</h3>
                <input type="date" name="date">
            </label>
            <label>
                <h3>Email</h3>
                <input type="email" name="email">
            </label>
            <label>
                <h3>Придумайте пароль</h3>
                <input type="password" name="newpassword">
            </label>
        </fieldset>
        <button>Отправить</button>
    </form>
</body>
</html>
